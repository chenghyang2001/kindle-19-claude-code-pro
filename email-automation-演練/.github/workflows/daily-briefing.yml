# daily-briefing.yml
# 排程說明：UTC 01:00 = Asia/Taipei 09:00，週一至週五自動執行每日晨報
# 執行順序：gmail_fetcher.py → run_briefing.py（兩個獨立 step，前者失敗即停止）

name: Daily Morning Briefing

on:
  schedule:
    - cron: '0 1 * * 1-5'   # UTC 01:00 = Taiwan (Asia/Taipei) 09:00，週一至週五
  workflow_dispatch:          # 允許手動觸發，方便測試

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Gmail emails
        run: python gmail_fetcher.py
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}

      - name: Run morning briefing
        run: python run_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
